<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Leads OAB Joinville</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --oab-blue: #1B2240; }
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Tela de Login -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-6">
            <i data-lucide="lock" class="mx-auto w-12 h-12 text-blue-900 mb-2"></i>
            <h1 class="text-2xl font-bold text-gray-800">Acesso Restrito</h1>
            <p class="text-gray-500 text-sm">Digite a senha para ver os leads</p>
        </div>
        <input type="password" id="admin-password" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-4 outline-none focus:ring-2 focus:ring-blue-900 text-center" placeholder="Senha">
        <button onclick="checkPassword()" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">ENTRAR</button>
        <p id="error-msg" class="text-red-500 text-sm mt-4 hidden text-center italic">Senha incorreta!</p>
    </div>

    <!-- Conteúdo do Admin -->
    <div id="admin-content" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 flex items-center gap-2">
                <i data-lucide="users"></i> LISTA DE INSCRITOS
            </h1>
            <button onclick="loadLeads()" class="flex items-center gap-1 text-sm bg-blue-900 text-white px-4 py-2 rounded-lg hover:bg-blue-800 shadow transition">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Atualizar Lista
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Inscrição</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Nome</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">WhatsApp</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">E-mail</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y divide-gray-100">
                        <!-- Leads serão carregados aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentPassword = '';

        function checkPassword() {
            const passInput = document.getElementById('admin-password');
            const errorMsg = document.getElementById('error-msg');
            
            if (passInput.value === '9886') {
                currentPassword = passInput.value;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadLeads();
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 2000);
            }
        }

        async function loadLeads() {
            try {
                const response = await fetch(`/api/leads?password=${currentPassword}`);
                const data = await response.json();
                const tableBody = document.getElementById('leads-table-body');
                
                if (data.success) {
                    tableBody.innerHTML = data.leads.map(lead => `
                        <tr class="hover:bg-gray-50 transition border-l-4 border-transparent hover:border-blue-900">
                            <td class="px-6 py-4 text-sm text-gray-500">
                                ${new Date(lead.created_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-900">${lead.nome}</td>
                            <td class="px-6 py-4 text-sm">
                                <a href="https://wa.me/${lead.telefone.replace(/\D/g, '')}" target="_blank" class="flex items-center gap-1 text-blue-600 hover:underline">
                                    <i data-lucide="phone" class="w-3 h-3"></i> ${lead.telefone}
                                </a>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600">${lead.email}</td>
                        </tr>
                    `).join('');
                    lucide.createIcons();
                } else {
                    alert('Erro no Servidor: ' + (data.error || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('Erro ao carregar leads:', error);
                alert('Não foi possível conectar ao servidor. O banco de dados está ativado?');
            }
        }
    </script>
</body>
</html>
